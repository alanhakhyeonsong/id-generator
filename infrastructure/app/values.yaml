global:
  name: id-generator
  namespace: ramos-id-generator-test
  image:
    repository: harbor.cone-chain.net/id-generator/id-generator
    tag: "latest"
    pullPolicy: IfNotPresent

replicaCount: 2

terminationGracePeriodSeconds: 45

lifecycle:
  preStop:
    exec:
      command: ["sh", "-c", "sleep 5"]

revisionHistoryLimit: 3

imagePullSecrets:
  - name: harbor-pull

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels:
  app: id-generator

podSecurityContext:
  fsGroup: 1001
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
    scheme: HTTP
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
  hosts:
    - host: ramos-id-test.cone-chain.net
      paths:
        - path: /
          pathType: Prefix
  tls: []

javaOpts: "-Xms256m -Xmx512m"

env:
  SPRING_PROFILES_ACTIVE: alpha

# App ConfigMap - 환경변수로 주입
appConfig:
  DB_URL: "jdbc:postgresql://192.168.0.42:5432/ramos-test"
  DB_USERNAME: "admin"
  HIKARI_MAX_POOL_SIZE: "10"
  HIKARI_MIN_IDLE: "5"
  VALKEY_SENTINEL_MASTER: "mymaster"
  VALKEY_SENTINEL_NODES: "valkey-sentinel.ramos-id-generator-test.svc.cluster.local:26379"

# App Secret - helm install 시 --set으로 주입 권장
appSecret:
  DB_PASSWORD: ""
  VALKEY_PASSWORD: ""

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app: id-generator
          topologyKey: kubernetes.io/hostname
