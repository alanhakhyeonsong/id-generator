apiVersion: v1
kind: Service
metadata:
  name: {{ include "id-generator.fullname" . }}-svc
  namespace: {{ include "id-generator.namespace" . }}
  labels:
    {{- include "id-generator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "id-generator.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
