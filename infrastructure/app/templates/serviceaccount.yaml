{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "id-generator.fullname" .) .Values.serviceAccount.name }}-sa
  namespace: {{ include "id-generator.namespace" . }}
  labels:
    {{- include "id-generator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
