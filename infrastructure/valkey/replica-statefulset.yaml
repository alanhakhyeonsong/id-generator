apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey-replica
  namespace: ramos-id-generator-test
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/component: replica
    app.kubernetes.io/part-of: valkey-sentinel
spec:
  serviceName: valkey-replica
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/component: replica
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/component: replica
        app.kubernetes.io/part-of: valkey-sentinel
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:7
          ports:
            - containerPort: 6379
              name: valkey
          command:
            - valkey-server
            - /etc/valkey/replica.conf
          volumeMounts:
            - name: config
              mountPath: /etc/valkey
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
                - valkey-cli
                - -a
                - testpass
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - valkey-cli
                - -a
                - testpass
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: valkey-config
            items:
              - key: replica.conf
                path: replica.conf
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: devcc-board
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
