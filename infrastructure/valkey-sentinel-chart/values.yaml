# ─── 기본값 ───
nameOverride: "valkey"

global:
  image:
    repository: valkey/valkey
    tag: "7.2.8"
    pullPolicy: IfNotPresent

# ─── 인증 ───
auth:
  # 비워두면 helm install 시 --set auth.password=xxx 로 주입
  password: ""
  # 기존 Secret이 있으면 이름 지정 (ESO/Vault 연동 시)
  existingSecret: ""
  secretKey: "VALKEY_PASSWORD"

# ─── Data Node (단일 StatefulSet — Sentinel이 역할 관리) ───
data:
  replicas: 3
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    storageClass: "devcc-board"
    size: 2Gi
  config:
    maxmemory: "192mb"
    maxmemory-policy: "allkeys-lru"
    appendonly: "yes"
    appendfsync: "everysec"
    min-replicas-to-write: "1"
    min-replicas-max-lag: "10"
    slowlog-log-slower-than: "10000"
    slowlog-max-len: "128"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: data
            topologyKey: kubernetes.io/hostname
  pdb:
    enabled: true
    minAvailable: 2

# ─── Sentinel ───
sentinel:
  replicas: 3
  masterName: "mymaster"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  config:
    downAfterMilliseconds: 5000
    failoverTimeout: 10000
    parallelSyncs: 1
    quorum: 2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: sentinel
          topologyKey: kubernetes.io/hostname
  pdb:
    enabled: true
    minAvailable: 2

# ─── Prometheus Exporter (sidecar) ───
metrics:
  enabled: false
  image:
    repository: oliver006/redis_exporter
    tag: "v1.66.0"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  serviceMonitor:
    enabled: false
    interval: 30s
