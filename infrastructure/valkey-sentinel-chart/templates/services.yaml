# Data Node Headless Service (개별 Pod DNS 노출)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
    app.kubernetes.io/component: data
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "valkey.data.selectorLabels" . | nindent 4 }}
  ports:
    - name: valkey
      port: 6379
      targetPort: 6379
      protocol: TCP
---
# Sentinel Headless Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey.fullname" . }}-sentinel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
    app.kubernetes.io/component: sentinel
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "valkey.sentinel.selectorLabels" . | nindent 4 }}
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
      protocol: TCP
