apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: k6-load-test
  labels:
    app.kubernetes.io/part-of: k6-load-test
data:
  smoke.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://ramos-id-test.cone-chain.net';

    export const options = {
      vus: 1,
      duration: '30s',
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<5000'],
      },
    };

    export default function () {
      // Health check
      const healthRes = http.get(`${BASE_URL}/actuator/health`);
      check(healthRes, {
        'health status 200': (r) => r.status === 200,
      });

      // Generate ID (BACKUP type)
      const genRes = http.post(`${BASE_URL}/api/v1/id-generation/BACKUP`, null, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(genRes, {
        'generate status 200': (r) => r.status === 200,
        'has body': (r) => r.body.length > 0,
      });

      sleep(1);
    }

  load.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://ramos-id-test.cone-chain.net';

    export const options = {
      stages: [
        { duration: '30s', target: 50 },
        { duration: '4m', target: 50 },
        { duration: '30s', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<3000', 'p(99)<5000'],
      },
    };

    export default function () {
      const res = http.post(`${BASE_URL}/api/v1/id-generation/BACKUP`, null, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(res, {
        'status 200': (r) => r.status === 200,
      });
      sleep(0.1);
    }

  stress.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://ramos-id-test.cone-chain.net';

    export const options = {
      stages: [
        { duration: '1m', target: 10 },
        { duration: '2m', target: 50 },
        { duration: '2m', target: 100 },
        { duration: '2m', target: 200 },
        { duration: '1m', target: 200 },
        { duration: '2m', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.05'],
        http_req_duration: ['p(95)<5000'],
      },
    };

    export default function () {
      const res = http.post(`${BASE_URL}/api/v1/id-generation/BACKUP`, null, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(res, {
        'status 200 or 429': (r) => r.status === 200 || r.status === 429,
      });
      sleep(0.05);
    }

  spike.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://ramos-id-test.cone-chain.net';

    export const options = {
      stages: [
        { duration: '30s', target: 10 },
        { duration: '30s', target: 500 },
        { duration: '1m', target: 500 },
        { duration: '30s', target: 10 },
        { duration: '2m', target: 10 },
        { duration: '30s', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.10'],
      },
    };

    export default function () {
      const res = http.post(`${BASE_URL}/api/v1/id-generation/BACKUP`, null, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(res, {
        'not 5xx': (r) => r.status < 500,
      });
      sleep(0.05);
    }

  soak.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    const BASE_URL = __ENV.BASE_URL || 'http://ramos-id-test.cone-chain.net';

    export const options = {
      stages: [
        { duration: '1m', target: 30 },
        { duration: '28m', target: 30 },
        { duration: '1m', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<5000'],
      },
    };

    export default function () {
      const res = http.post(`${BASE_URL}/api/v1/id-generation/BACKUP`, null, {
        headers: { 'Content-Type': 'application/json' },
      });
      check(res, {
        'status 200': (r) => r.status === 200,
      });
      sleep(0.5);
    }
