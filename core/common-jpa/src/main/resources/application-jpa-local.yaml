spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/idgen
    username: testuser
    password: testpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 3000
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
